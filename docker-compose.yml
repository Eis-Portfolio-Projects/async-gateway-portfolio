version: '3.8'

services:
  gateway:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - REDIS_URL=redis://redis:6379/0
      - GATEWAY_API_KEY=prod_secret_token_123789
      - TARGET_API_URL=https://httpbin.org/post
    depends_on:
      - redis

  worker:
    build: .
    command: celery -A tasks.celery_app worker --loglevel=info
    volumes:
      - .:/app
    environment:
      - REDIS_URL=redis://redis:6379/0
      - TARGET_API_URL=https://httpbin.org/post
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"